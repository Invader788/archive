#################################
#           Backend             #
#################################
backend = "glx";
vsync = true;
use-damage = false;

#################################
#           Fading              #
#################################
fading = true;

# Smooth but not sluggish
fade-in-step = 0.02;
fade-out-step = 0.02;
fade-delta = 8;

#################################
#           Animations          #
#################################
animations = true;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";

animation-stiffness = 140;
animation-dampening = 28;
animation-mass = 1.2;
animation-clamping = false;

#################################
#           Opacity             #
#################################
# Active window = 100%, inactive fades smoothly
inactive-opacity = 0.80;
active-opacity = 1.0;
frame-opacity = 1.0;

# Force picom to control opacity consistently
inactive-opacity-override = true;

# Example app-specific rules
opacity-rule = [
  "95:class_g = 'qutebrowser' && focused",
  "85:class_g = 'qutebrowser' && !focused"
];

focus-exclude = [
  "class_g = 'Cairo-clock'",
  "window_type = 'dock'"
];

#################################
#           Corners             #
#################################
corner-radius = 12;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'dwm'",
  "class_g = 'dwmbar'"
];

#################################
#             Blur              #
#################################
blur-method = "dual_kawase";
blur-strength = 8;

blur-background = true;
blur-background-fixed = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'dwm'",
  "class_g = 'dwmbar'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#       General Settings        #
#################################
mark-wmwin-focused = true;
mark-ovlptr-focused = true;

detect-rounded-corners = true;
detect-client-opacity = true;

#################################
#           Window Types        #
#################################
wintypes:
{
  tooltip = {
    fade = true;
    shadow = true;
    opacity = 0.75;
    focus = true;
  };

  dock = {
    shadow = false;
    clip-shadow-above = true;
    blur-background = false;
  };

  dnd = {
    shadow = false;
  };

  popup_menu = {
    opacity = 0.8;
  };

  dropdown_menu = {
    opacity = 0.8;
  };
};
