#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
#           Corners             #
#################################
corner-radius = 12;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'dwm'",
  "class_g = 'dwmbar'"
];

#################################
#             Blur              #
#################################
blur-method = "dual_kawase";
blur-strength = 8;
blur-background = true;
blur-background-fixed = true;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'dwm'",
  "class_g = 'dwmbar'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#           Opacity             #
#################################
# Make ALL windows identical opacity
active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 1.0;

# Force Picom to ignore app/window-set opacity differences
inactive-opacity-override = true;
detect-client-opacity = false;

# Remove all per-app opacity rules
opacity-rule = [ ];

focus-exclude = [ 
  "class_g = 'Cairo-clock'",
  "window_type = 'dock'" 
];

#################################
#       General Settings        #
#################################
backend = "glx";
vsync = true;

mark-wmwin-focused = true;
mark-ovlptr-focused = true;

detect-rounded-corners = true;

# Helps avoid flickering in browsers
use-damage = false;

#################################
#          Window Types         #
#################################
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 1.0; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; blur-background = false; opacity = 1.0; }
  dnd = { shadow = false; opacity = 1.0; }
  popup_menu = { opacity = 1.0; }
  dropdown_menu = { opacity = 1.0; }
};

#################################
#          Animations           #
#################################
animations = true;

animation-for-open-window = "zoom";
animation-for-unmap-window = "zoom";

animation-stiffness = 250;
animation-dampening = 20;
animation-mass = 0.8;

animation-clamping = false;
