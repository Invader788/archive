#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.35;
shadow-offset-x = -12;
shadow-offset-y = -12;

shadow-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "override_redirect = true"
];

#################################
# Fading
#################################

fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 5;

#################################
# Opacity
#################################

inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;

#################################
# Blur
#################################

blur-method = "dual_kawase";
blur-strength = 6;

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "override_redirect = true"
];

#################################
# Corners
#################################

corner-radius = 10;

#################################
# Animations (ftlabs fork)
#################################

animations = true;

animation-stiffness = 200.0;
animation-window-mass = 1.0;
animation-dampening = 20.0;
animation-clamping = false;

animation-for-open-window = "zoom";
animation-for-unmap-window = "slide-up";