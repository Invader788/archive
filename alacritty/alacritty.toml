# --- Window ---
[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
opacity = 0.45
decorations = "None"

# --- Font ---
[font]
size = 8

[font.normal]
family = "MartianMono Nerd Font"
style = "Regular"

[font.bold]
family = "MartianMono Nerd Font"
style = "Bold"

[font.italic]
family = "MartianMono Nerd Font"
style = "Italic"

# --- Colors ---
[colors.primary]
background = "#0d0f18"
foreground = "#cdd6f4"

[colors.normal]
black   = "#1e1e2e"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#bac2de"

[colors.bright]
black   = "#585b70"
red     = "#f38ba8"
green   = "#a6e3a1"
yellow  = "#f9e2af"
blue    = "#89b4fa"
magenta = "#cba6f7"
cyan    = "#94e2d5"
white   = "#a6adc8"

# --- Cursor ---
[cursor]
style = { shape = "Beam", blinking = "On" }

# --- Shell ---
[terminal.shell]
program = "/usr/bin/zsh"

# --- Keybindings ---
[[keyboard.bindings]]
key = "Z"
mods = "Control|Shift"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "X"
mods = "Control|Shift"
action = "IncreaseFontSize"
